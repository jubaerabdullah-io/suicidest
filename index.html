<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suicide Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f5f8ff; 
  --bg2:#eef4ff;
  --panel:#ffffff;
  --panel2:#f8fbff;
  --card:#ffffff;
  --card2:#f9fbff;
  --line:rgba(29,64,110,.14);
  --line2:rgba(29,64,110,.26);
  --text:#101827;
  --muted:#52657f;
  --dim:#7c8ca4;
  --cyan:#007fa3;
  --cyan2:#16c7e8;
  --psc:#7c4dff;
  --jsc:#2478d8;
  --ssc:#048f74;
  --hsc:#e36c1e;
  --danger:#d83b62;
  --warning:#b77900;
  --violet:#7c4dff;
  --shadow:0 20px 60px rgba(32,56,96,.14);
  --r:22px;
  --rs:14px;
  --navH:68px;
  --drawerW:620px;
}
body[data-theme="dark"]{
  --bg:#070b14;
  --bg2:#0c1220;
  --panel:#111827;
  --panel2:#151f31;
  --card:#101827;
  --card2:#0d1524;
  --line:rgba(151,178,220,.18);
  --line2:rgba(151,178,220,.30);
  --text:#eef5ff;
  --muted:#a8b7d2;
  --dim:#7588aa;
  --cyan:#18e8ff;
  --cyan2:#18e8ff;
  --psc:#9f7aff;
  --jsc:#5ba7ff;
  --ssc:#22d3a6;
  --hsc:#ff8a3d;
  --danger:#ff647c;
  --warning:#ffcc66;
  --violet:#a78bfa;
  --shadow:0 24px 80px rgba(0,0,0,.48);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,sans-serif;
  background:
    radial-gradient(circle at 7% 2%,rgba(0,173,216,.16),transparent 22%),
    radial-gradient(circle at 92% 6%,rgba(124,88,255,.10),transparent 28%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  line-height:1.5;
  overflow-x:hidden;
}
body[data-theme="dark"]{
  background:
    radial-gradient(circle at 8% 4%,rgba(24,232,255,.16),transparent 22%),
    radial-gradient(circle at 92% 10%,rgba(167,139,250,.14),transparent 28%),
    linear-gradient(180deg,var(--bg),var(--bg2));
}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}
::selection{background:rgba(24,232,255,.26)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(120,144,180,.35);border-radius:999px}

nav{
  position:sticky;
  top:0;
  z-index:40;
  height:var(--navH);
  display:flex;
  align-items:center;
  gap:1rem;
  padding:0 2rem;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
}
body[data-theme="dark"] nav{background:rgba(7,11,20,.72)}
.brand{
  display:flex;
  align-items:center;
  gap:.8rem;
  min-width:0;
  font-family:'DM Serif Display',serif;
  font-size:1.18rem;
  letter-spacing:.01em;
}
.brand-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--cyan2);
  box-shadow:0 0 12px var(--cyan2),0 0 32px rgba(24,232,255,.36);
  flex:0 0 auto;
}
.nav-spacer{flex:1}
.nav-btn{
  border:1px solid var(--line2);
  background:linear-gradient(135deg,rgba(255,255,255,.70),rgba(255,255,255,.28));
  color:var(--text);
  border-radius:999px;
  padding:.55rem .85rem;
  font-size:.78rem;
  font-weight:800;
}
body[data-theme="dark"] .nav-btn{background:rgba(255,255,255,.04)}
.cart-btn{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  border-color:color-mix(in srgb,var(--cyan),transparent 58%);
}
.cart-count{
  min-width:1.25rem;
  height:1.25rem;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  background:var(--cyan);
  color:#fff;
  font-size:.68rem;
}
body[data-theme="dark"] .cart-count{color:#03111b}

.shell{
  max-width:1440px;
  margin:0 auto;
  padding:1.35rem 2rem 2rem;
}
.top-grid{
  display:grid;
  grid-template-columns:1.35fr .95fr;
  gap:1rem;
  align-items:stretch;
}
.panel-card{
  --accent:var(--cyan);
  position:relative;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:var(--r);
  background:
    linear-gradient(145deg,rgba(255,255,255,.70),rgba(255,255,255,.28)),
    var(--card);
  box-shadow:var(--shadow);
  padding:1.15rem;
  color:var(--text);
}
body[data-theme="dark"] .panel-card{
  background:
    linear-gradient(145deg,rgba(255,255,255,.055),rgba(255,255,255,.018)),
    var(--card);
}
.panel-card:before{
  content:"";
  position:absolute;
  inset:-2px;
  pointer-events:none;
  background:radial-gradient(circle at 18% 0%,color-mix(in srgb,var(--accent),transparent 76%),transparent 35%);
  opacity:.75;
}
.panel-card > *{position:relative;z-index:2}
.overall-card{
  min-height:235px;
}
.overall-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:1rem;
  margin-bottom:.65rem;
}
.overall-title{
  font-family:'DM Serif Display',serif;
  font-size:1.7rem;
  line-height:1;
}
.overall-small{font-size:.8rem;color:var(--muted);margin-top:.25rem}
.overall-total{
  font-family:'DM Serif Display',serif;
  font-size:3.3rem;
  line-height:.9;
  color:var(--cyan);
  text-align:right;
  text-shadow:0 0 24px color-mix(in srgb,var(--cyan),transparent 62%);
}
.chart-wrap{height:190px}
.risk-card .chart-wrap{height:245px}
.risk-card canvas{cursor:default!important}
.chart-title{
  font-family:'DM Serif Display',serif;
  font-size:1.45rem;
  line-height:1.1;
}
.chart-hint{
  color:var(--dim);
  font-size:.78rem;
  margin-top:.2rem;
  margin-bottom:.6rem;
}
.kpi-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(230px,1fr));
  gap:1.15rem;
  margin-top:1.35rem;
}
.kpi-card{
  --accent:var(--cyan);
  position:relative;
  overflow:hidden;
  min-height:235px;
  border:1px solid color-mix(in srgb,var(--accent),transparent 82%);
  border-radius:30px;
  background:
    radial-gradient(circle at 3% 8%,color-mix(in srgb,var(--accent),transparent 82%),transparent 42%),
    linear-gradient(115deg,color-mix(in srgb,var(--accent),transparent 90%) 0%,rgba(255,255,255,.92) 48%,rgba(255,255,255,.98) 100%),
    var(--card);
  box-shadow:0 18px 46px rgba(32,56,96,.12);
  padding:1.28rem 1.28rem 1.05rem;
  color:var(--text);
  text-align:left;
  transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease;
}
body[data-theme="dark"] .kpi-card{
  background:
    radial-gradient(circle at 3% 8%,color-mix(in srgb,var(--accent),transparent 72%),transparent 42%),
    linear-gradient(135deg,rgba(255,255,255,.065),rgba(255,255,255,.018)),
    var(--card);
  box-shadow:var(--shadow);
}
.kpi-card:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,color-mix(in srgb,var(--accent),transparent 92%),transparent 55%),
    radial-gradient(circle at 100% 0%,rgba(255,255,255,.72),transparent 30%);
  pointer-events:none;
}
body[data-theme="dark"] .kpi-card:before{
  background:
    linear-gradient(90deg,color-mix(in srgb,var(--accent),transparent 86%),transparent 60%),
    radial-gradient(circle at 100% 0%,rgba(255,255,255,.08),transparent 30%);
}
.kpi-card:after{
  content:"";
  position:absolute;
  left:20px;
  bottom:0;
  right:20px;
  height:4px;
  border-radius:999px 999px 0 0;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 18%,var(--accent) 82%,transparent 100%);
  box-shadow:0 -8px 28px color-mix(in srgb,var(--accent),transparent 58%);
}
.kpi-card:hover{
  transform:translateY(-5px);
  border-color:color-mix(in srgb,var(--accent),white 10%);
  box-shadow:0 24px 68px rgba(32,56,96,.18),0 0 32px color-mix(in srgb,var(--accent),transparent 78%);
}
body[data-theme="dark"] .kpi-card:hover{box-shadow:var(--shadow),0 0 34px color-mix(in srgb,var(--accent),transparent 75%)}
.kpi-card > *{position:relative;z-index:2}
.kpi-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:.75rem;
}
.kpi-label{
  font-family:'DM Serif Display',serif;
  font-size:1.75rem;
  line-height:1;
  color:#080f22;
}
body[data-theme="dark"] .kpi-label{color:var(--text)}
.kpi-chip{
  border:1px solid rgba(29,64,110,.16);
  border-radius:999px;
  color:#1e4475;
  background:rgba(255,255,255,.74);
  padding:.38rem .68rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:.68rem;
  font-weight:800;
  letter-spacing:.10em;
  text-transform:uppercase;
  box-shadow:0 8px 18px rgba(32,56,96,.08);
}
body[data-theme="dark"] .kpi-chip{
  color:var(--muted);
  border-color:var(--line);
  background:rgba(255,255,255,.04);
  box-shadow:none;
}
.kpi-count{
  position:absolute;
  left:1.28rem;
  bottom:2.35rem;
  font-family:'DM Serif Display',serif;
  font-size:3.15rem;
  line-height:.9;
  color:var(--accent);
  text-shadow:0 0 22px color-mix(in srgb,var(--accent),transparent 70%);
}
.kpi-sub{
  position:absolute;
  left:1.28rem;
  bottom:1.15rem;
  color:#1e4475;
  font-size:.93rem;
  letter-spacing:.01em;
}
body[data-theme="dark"] .kpi-sub{color:var(--muted)}

.drawer-overlay{
  position:fixed;
  inset:0;
  z-index:90;
  background:rgba(0,0,0,.44);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  backdrop-filter:blur(4px);
}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;
  top:0;
  right:0;
  z-index:91;
  width:var(--drawerW);
  max-width:96vw;
  height:100vh;
  background:var(--panel);
  border-left:1px solid var(--line2);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.2,.8,.2,1);
  box-shadow:-20px 0 80px rgba(0,0,0,.34);
  display:flex;
  flex-direction:column;
}
.drawer.open{transform:translateX(0)}
.drawer-header{
  flex:0 0 auto;
  padding:1.35rem 1.45rem 1.1rem;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  gap:1rem;
  align-items:flex-start;
}
.drawer-kicker{
  color:var(--cyan);
  font-family:'IBM Plex Mono',monospace;
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:.25rem;
}
.drawer-title{
  font-family:'DM Serif Display',serif;
  font-size:1.62rem;
  line-height:1.1;
}
.drawer-count{
  color:var(--muted);
  font-size:.86rem;
  margin-top:.45rem;
}
.drawer-actions{
  display:flex;
  flex-wrap:wrap;
  gap:.55rem;
  justify-content:flex-end;
}
.drawer-close,.drawer-tool{
  border:1px solid var(--line2);
  border-radius:14px;
  background:rgba(255,255,255,.30);
  color:var(--text);
  padding:.62rem .8rem;
  font-weight:800;
}
body[data-theme="dark"] .drawer-close,
body[data-theme="dark"] .drawer-tool{background:rgba(255,255,255,.04)}
.drawer-body{
  flex:1;
  overflow-y:auto;
  padding:1.15rem 1.25rem 1.5rem;
}
.news-card{
  --accent:var(--cyan);
  position:relative;
  display:block;
  border:1px solid var(--line);
  border-radius:18px;
  background:
    linear-gradient(140deg,color-mix(in srgb,var(--accent),transparent 94%),rgba(255,255,255,.55)),
    var(--card2);
  padding:1rem;
  margin-bottom:.85rem;
  box-shadow:0 14px 36px rgba(32,56,96,.10);
  overflow:visible;
}
body[data-theme="dark"] .news-card{
  background:
    linear-gradient(140deg,color-mix(in srgb,var(--accent),transparent 94%),rgba(255,255,255,.025)),
    var(--card2);
  box-shadow:0 14px 36px rgba(0,0,0,.22);
}
.news-card:before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
  background:var(--accent);
  border-radius:18px 0 0 18px;
}
.badges{
  display:flex;
  flex-wrap:wrap;
  gap:.38rem;
  margin-bottom:.7rem;
}
.badge{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  border:1px solid var(--line2);
  background:rgba(255,255,255,.46);
  color:var(--muted);
  padding:.24rem .55rem;
  font-size:.68rem;
  font-weight:800;
}
body[data-theme="dark"] .badge{background:rgba(255,255,255,.045)}
.badge.hot{
  color:var(--accent);
  border-color:color-mix(in srgb,var(--accent),transparent 50%);
  background:color-mix(in srgb,var(--accent),transparent 88%);
}
.news-card h3{
  font-family:'DM Serif Display',serif;
  font-size:1.2rem;
  line-height:1.25;
  color:var(--text);
  margin-bottom:.45rem;
  overflow-wrap:anywhere;
}
.news-card p{
  color:var(--muted);
  font-size:.86rem;
  margin-bottom:.65rem;
}
.news-meta{
  font-family:'IBM Plex Mono',monospace;
  color:var(--dim);
  font-size:.72rem;
  overflow-wrap:anywhere;
  margin-bottom:.85rem;
}
.actions{
  display:flex;
  justify-content:flex-end;
  gap:.55rem;
  flex-wrap:wrap;
}
.action-btn{
  border:1px solid var(--line2);
  background:rgba(255,255,255,.40);
  color:var(--text);
  border-radius:12px;
  padding:.55rem .72rem;
  font-size:.75rem;
  font-weight:900;
}
body[data-theme="dark"] .action-btn{background:rgba(255,255,255,.045)}
.action-btn:hover{border-color:var(--accent)}
.action-btn.primary{
  background:linear-gradient(90deg,color-mix(in srgb,var(--accent),#fff 8%),color-mix(in srgb,var(--accent),#000 3%));
  color:#fff;
  border-color:transparent;
}
body[data-theme="dark"] .action-btn.primary{color:#03111b}
.note-box{
  margin-top:.75rem;
  border:1px solid var(--line);
  border-radius:12px;
  padding:.75rem;
  background:rgba(255,255,255,.35);
  color:var(--muted);
  font-size:.82rem;
}
body[data-theme="dark"] .note-box{background:rgba(255,255,255,.035)}
.empty-state{
  border:1px dashed var(--line2);
  border-radius:18px;
  padding:1.2rem;
  color:var(--muted);
  text-align:center;
}
.cart-empty-actions{display:flex;justify-content:center;margin-top:1rem}

@media(max-width:1120px){
  .top-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,minmax(230px,1fr))}
}
@media(max-width:720px){
  nav{padding:0 1rem}
  .brand{font-size:1rem}
  .shell{padding:1rem}
  .kpi-row{grid-template-columns:1fr}
  .kpi-card{min-height:220px}
  .chart-wrap,.risk-card .chart-wrap{height:250px}
  :root{--drawerW:100vw}
  .drawer-header{flex-direction:column}
  .drawer-actions{justify-content:flex-start}
}

.year-filter-box{
  border:1px solid var(--line);
  border-radius:16px;
  padding:.85rem 1rem;
  margin-bottom:1rem;
  background:rgba(255,255,255,.38);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.8rem;
  flex-wrap:wrap;
}
body[data-theme="dark"] .year-filter-box{background:rgba(255,255,255,.035)}
.year-filter-box label{
  color:var(--muted);
  font-weight:800;
  font-size:.78rem;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.year-select{
  border:1px solid var(--line2);
  border-radius:999px;
  background:var(--panel);
  color:var(--text);
  padding:.52rem .75rem;
  font-weight:800;
  outline:none;
}
.news-facts{
  display:flex;
  flex-wrap:wrap;
  gap:.45rem;
  margin:.65rem 0 .8rem;
}
.fact-pill{
  border:1px solid var(--line2);
  border-radius:999px;
  background:rgba(255,255,255,.44);
  color:var(--text);
  padding:.34rem .62rem;
  font-size:.78rem;
  font-weight:800;
}
body[data-theme="dark"] .fact-pill{background:rgba(255,255,255,.045)}


.risk-breakdown{
  display:grid;
  grid-template-columns:1fr;
  gap:.45rem;
  margin-top:.75rem;
}
.risk-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.75rem;
  border:1px solid var(--line);
  border-radius:12px;
  padding:.45rem .6rem;
  background:rgba(255,255,255,.34);
  color:var(--text);
}
body[data-theme="dark"] .risk-row{background:rgba(255,255,255,.035)}
.risk-left{
  display:flex;
  align-items:center;
  gap:.5rem;
  min-width:0;
}
.risk-dot{
  width:.75rem;
  height:.75rem;
  border-radius:50%;
  flex:0 0 auto;
}
.risk-name{
  font-size:.78rem;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.risk-value{
  font-family:'IBM Plex Mono',monospace;
  font-size:.78rem;
  font-weight:800;
  color:var(--muted);
  white-space:nowrap;
}


.second-row{
  margin-top:1.15rem;
}


/* === 2026 latest news replacement for  === */
.latest-card{
  --accent:var(--cyan);
  min-height:235px;
}
.latest-card .chart-wrap{
  height:245px;
}
.latest-breakdown{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:.5rem;
  margin-top:.75rem;
}
.latest-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.75rem;
  border:1px solid var(--line);
  border-radius:12px;
  padding:.5rem .65rem;
  background:rgba(255,255,255,.34);
  color:var(--text);
}
body[data-theme="dark"] .latest-row{background:rgba(255,255,255,.035)}
.latest-left{
  display:flex;
  align-items:center;
  gap:.5rem;
  min-width:0;
}
.latest-dot{
  width:.75rem;
  height:.75rem;
  border-radius:50%;
  flex:0 0 auto;
}
.latest-name{
  font-size:.8rem;
  font-weight:900;
}
.latest-value{
  font-family:'IBM Plex Mono',monospace;
  font-size:.74rem;
  font-weight:800;
  color:var(--muted);
  text-align:right;
}
.latest-meta{
  color:var(--muted);
  font-size:.84rem;
  margin:.35rem 0 .75rem;
}
@media(max-width:720px){
  .latest-card .chart-wrap{height:230px}
  .latest-breakdown{grid-template-columns:1fr}
}


/* === v14 mobile and bug-fix optimization layer === */
.latest-card,
.overall-card{
  min-width:0;
}

.latest-card .chart-wrap,
.overall-card .chart-wrap{
  width:100%;
}

.drawer{
  max-width:100vw;
}

.drawer-body{
  overscroll-behavior:contain;
}

.news-card{
  word-break:break-word;
}

@media(max-width:980px){
  .top-grid.second-row{
    grid-template-columns:1fr;
  }
  .latest-card,
  .overall-card{
    min-height:auto;
  }
}

@media(max-width:720px){
  nav{
    height:auto;
    min-height:64px;
    padding:.65rem .85rem;
    flex-wrap:wrap;
    gap:.55rem;
  }
  .brand{
    flex:1 1 100%;
    font-size:1.02rem;
  }
  .nav-spacer{
    display:none;
  }
  .nav-btn{
    flex:1 1 calc(50% - .3rem);
    text-align:center;
    min-height:42px;
    padding:.55rem .65rem;
  }
  .shell{
    padding:.85rem .75rem 1.35rem;
  }

function isWeakCaption(value){
  const t = String(value || "").trim();
  const compact = t.replace(/\s+/g,"");
  if(!t || compact.length < 5) return true;
  const lower = t.toLowerCase();
  const weak = new Set([
    "source article","linked news record","country news","cities villages","crime and discipline",
    "medical college news","public university","private university","law courts","capital",
    "campus","school","college","news","article","details","post","archives","archive",
    "printnews","print","country","national","bangladesh","home","advertise","loading portal caption..."
  ]);
  if(weak.has(lower)) return true;
  if(/^[a-f0-9]{10,}$/i.test(compact)) return true;
  if(/^[A-Za-z0-9]{8,}$/.test(compact) && !t.includes(" ")) return true;
  if(/^[A-Za-z.-]+\.(com|net|org|bd|tv|news)\s+article$/i.test(t)) return true;
  if(/\barticle$/i.test(t) && t.split(/\s+/).length <= 3) return true;
  if(/^(a report|reports|several reports|multiple outlets|many outlets|individual media report|cluster report|media report linked|a local outlet|local\/archived reports|a mixed local report)/i.test(t)) return true;
  if(/source record|source-level row|accessible report did not|do not include|context only/i.test(t)) return true;
  return false;
}
function safePortalTitle(value){
  let t = String(value || "")
    .replace(/\s*\|\s*[^|]{0,70}$/,"")
    .replace(/\s*-\s*(Dhaka Post|The Daily Campus|Jugantor|Jago News|Prothom Alo|Somoy News|NTV|Ittefaq|Kalbela|Bangladesh Pratidin|Daily Inqilab|RTV|Bangla Tribune).*$/i,"")
    .replace(/\s+/g," ")
    .trim();

  t = t
    .replace(/গলায়\s*ফাঁস\s*দিয়ে/gi,"")
    .replace(/গলায়\s*ফাঁস/gi,"")
    .replace(/ফাঁস\s*নিলেন/gi,"")
    .replace(/ঝুলন্ত\s*অবস্থায়/gi,"")
    .replace(/ঝুলন্ত\s*মরদেহ/gi,"মরদেহ")
    .replace(/বিষপান/gi,"")
    .replace(/\bhanging\b/gi,"")
    .replace(/\bpoison(ing)?\b/gi,"")
    .replace(/\s+/g," ")
    .trim();

  return t;
}
function bestStaticCaptionFromUrl(url){

function bestCaptionFromUrlList(value){
  const urls = String(value || "").split("|").map(x=>x.trim()).filter(Boolean);
  for(const u of urls){

    if(!isWeakCaption(override)) return safePortalTitle(override);

  }
  return "";
}
function contextCaption(obj={}){
  const stage = String(obj.exam_stage || obj.education_or_age_group || obj.exam_category || "Student").replace(/\s+/g," ").trim();
  const place = String(obj.broad_area || "").replace(/\s+/g," ").trim();

  let base = stage;
  if(/ssc/i.test(stage)) base = "SSC exam-period news";
  else if(/hsc/i.test(stage)) base = "HSC linked news";
  else if(/jsc/i.test(stage)) base = "JSC linked news";
  else if(/psc|pec/i.test(stage)) base = "PSC/PEC linked news";
  else if(/medical/i.test(stage)) base = "Medical student news";
  else if(/university/i.test(stage)) base = "University student news";
  else if(/college/i.test(stage)) base = "College student news";
  else if(/school/i.test(stage)) base = "School student news";
  else base = `${base} news`;

  let title = place ? `${base} — ${place}` : base;
  if(date && !title.includes(date)) title += ` (${date})`;
  return safePortalTitle(title);
}

function deathMin(s){ return Number(s.reported_deaths_min ?? s.case_count_reported ?? 0) || 0; }
function latestYear(r){
  const direct = Number(r.year || 0);
  if(direct) return direct;
  const m = String(r.incident_or_publication_date || "").match(/\d{4}/);
  return m ? Number(m[0]) : 2026;
}
function latestAsSourceRows(cat="ALL"){
  return latest2026VisibleRows()
    .filter(r => {
      const group = latest2026Group(r);
      return (cat === "ALL" || group === cat) && (group === "SSC" || group === "HSC");
    })
    .map((r, i) => ({
      id:`LATEST-${r.record_id || i}`,
      source_type:"latest2026",
      latest_record_id:String(r.record_id || i),
      exam_category:latest2026Group(r),
      source_no:r.record_id || "2026 latest",
      url:r.primary_source_url || "",
      outlet:r.primary_source_name || "Source",
      domain:domainFromUrl(r.primary_source_url || ""),
      inferred_title:latestTitle(r),
      news_title:latestTitle(r),
      inferred_year:latestYear(r),
      risk_period:"2026 Latest News",
      period_raw:r.record_category || "2026 latest news",
      reported_deaths_min:Number(r.reported_deaths_min || 0) || 0,
      reported_deaths_max:Number(r.reported_deaths_max || r.reported_deaths_min || 0) || 0,
      case_count_reported:Number(r.reported_deaths_min || 0) || 0,
      verification_status:r.source_confidence || "",
      include_in_main_count:r.include_in_main_academic_pressure_death_count || "",
      notes:r.excluded_or_context_note || r.data_warning || "",
      safe_summary:r.safe_summary || "",
      language:""
    }));
}
function uniqueSources(cat){
  const base = SOURCES.filter(s => cat === "ALL" || s.exam_category === cat);
  if(cat === "SSC" || cat === "HSC" || cat === "ALL") return base.concat(latestAsSourceRows(cat));
  return base;
}
function uniqueCount(cat){ return uniqueSources(cat).length; }
function sourceYears(rows){ return [...new Set(rows.map(s => Number(s.inferred_year)).filter(Boolean))].sort((a,b)=>b-a); }
function filterRowsByYear(rows, year){ return year === "ALL" ? rows : rows.filter(s => String(Number(s.inferred_year || 0)) === String(year)); }
function sumDeaths(rows){ return rows.reduce((sum,s)=>sum + deathMin(s), 0); }
function riskLabels(){ return [...new Set(SOURCES.map(s=>s.risk_period).filter(Boolean))]; }
function riskColorAt(i){ const p = riskPalette(); return p[i % p.length]; }
function renderRiskBreakdown(){
  const el = document.getElementById("riskBreakdown");
  if(!el) return;
  const risks = riskLabels();
  el.innerHTML = risks.map((r,i)=>{
    const total = sumDeaths(SOURCES.filter(s=>s.risk_period===r));
    const count = SOURCES.filter(s=>s.risk_period===r).length;
    return `<div class="risk-row">
      <div class="risk-left"><span class="risk-dot" style="background:${riskColorAt(i)}"></span><span class="risk-name">${r}</span></div>
      <span class="risk-value">${total.toLocaleString()} deaths · ${count} records</span>
    </div>`;
  }).join("");
}

function chartBaseOptions(){
  return {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{labels:{color:cssVar("--muted"), font:{size:11,weight:"700"}, boxWidth:12, padding:14}},

    }
  };
}
function makeAreaGradient(ctx){
  const g = ctx.createLinearGradient(0,0,0,180);
  if(isDark()){
    g.addColorStop(0,"rgba(24,232,255,.40)");
    g.addColorStop(.55,"rgba(159,122,255,.16)");
    g.addColorStop(1,"rgba(24,232,255,0)");
  }else{
    g.addColorStop(0,"rgba(0,127,163,.28)");
    g.addColorStop(.55,"rgba(124,77,255,.12)");
    g.addColorStop(1,"rgba(0,127,163,0)");
  }
  return g;
}
function renderCharts(){
  const years = OVERALL_STATS.map(r=>r.year);
  const counts = OVERALL_STATS.map(r=>r.count);
  const areaCanvas = document.getElementById("overallAreaChart");
  if(areaCanvas){

      options:{...chartBaseOptions(),plugins:{...chartBaseOptions().plugins,legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw.toLocaleString()} student deaths`}}},scales:{x:{grid:{display:false},ticks:{color:cssVar("--dim"),font:{size:11,weight:"700"}}},y:{beginAtZero:true,grid:{color:"rgba(130,160,210,.14)"},ticks:{color:cssVar("--dim"),font:{size:11}}}},onClick:()=>openOverallDrawer()}
    });
  }

  if(latestCanvas){
    const groups = ["OVERALL_2026","SSC","HSC"];
    const labels = ["Overall","SSC","HSC"];
    const values = groups.map(g => g === "OVERALL_2026" ? child2026Rows().length : latest2026Rows(g).length);
    const colors = groups.map(g => g === "OVERALL_2026" ? catColor("CHILD") : catColor(g));
    charts.latest2026 = new Chart(latestCanvas, {
      type:"bar",
      data:{
        labels,
        datasets:[{
          label:"2026 latest records",
          data:values,
          backgroundColor:colors.map(c=>c+"55"),
          borderColor:colors,
          borderWidth:2,
          borderRadius:12,
          maxBarThickness:72
        }]
      },
      options:{
        ...chartBaseOptions(),
        plugins:{
          ...chartBaseOptions().plugins,
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>{
            const group = groups[ctx.dataIndex];
            const rows = group === "OVERALL_2026" ? child2026Rows() : latest2026Rows(group);
            const deaths = group === "OVERALL_2026" ? sumChild2026Deaths(rows) : sumLatestDeaths(rows);
            return ` ${rows.length} records · ${deaths.toLocaleString()} reported deaths`;
          }}}
        },
        scales:{
          x:{grid:{display:false},ticks:{color:cssVar("--muted"),font:{size:12,weight:"900"}}},
          y:{beginAtZero:true,grid:{color:"rgba(130,160,210,.14)"},ticks:{precision:0,color:cssVar("--dim"),font:{size:11,weight:"700"}}}
        },
        onClick:(e,els)=>{ if(els.length){ openLatest2026Drawer(groups[els[0].index]); } }
      }
    });
    renderLatestBreakdown();
  }
}


function latest2026Group(r){
  const stage = String(r.exam_stage || "").trim().toUpperCase();
  if(stage.startsWith("SSC")) return "SSC";
  if(stage.startsWith("HSC")) return "HSC";
  return "OTHER";
}
function latest2026VisibleRows(){
  return LATEST_2026_NEWS.filter(r => (Number(r.reported_deaths_min || 0) || 0) > 0);
}
function latest2026Rows(group="ALL"){
  const rows = latest2026VisibleRows();
  if(group === "ALL") return rows;
  return rows.filter(r => latest2026Group(r) === group);
}
function sumLatestDeaths(rows){
  return rows.reduce((sum,r)=>sum + (Number(r.reported_deaths_min || 0) || 0), 0);
}
function latestTitle(r){
  const primary = titleFromAnyFields({ ...r, source_url:r.primary_source_url }, "source_url");
  if(!isWeakCaption(primary) && !/^(SSC|HSC).*news/i.test(primary)) return primary;

  const supportCaption = bestCaptionFromUrlList(r.supporting_source_urls);
  if(!isWeakCaption(supportCaption)) return supportCaption;

  return primary;
}
function child2026VisibleRows(){
  return CHILD_STUDENT_2026_SOURCES.filter(r => (Number(r.reported_deaths_min_group || 0) || 0) > 0 && Number(r.incident_year || 0) === 2026);
}
function child2026Rows(){
  return child2026VisibleRows().sort((a,b)=>String(b.date_or_publication_date||"").localeCompare(String(a.date_or_publication_date||"")));
}
function child2026GroupSources(groupId){
  return child2026VisibleRows().filter(r => String(r.incident_group_id) === String(groupId));
}
function sumChild2026Deaths(rows){
  return rows.reduce((sum,r)=>sum + (Number(r.reported_deaths_min_group || 0) || 0), 0);
}

function normalizedUrl(value){
  return sourceUrl(String(value || "").trim()).replace(/\/+$/,"");
}

function rawTitleField(r){
  const keys = ["raw_title","news_title_raw","source_title","article_title","headline","portal_caption","caption","display_title"];
  for(const key of keys){
    const value = String((r && r[key]) || "").trim();
    if(value) return value;
  }
  return "";
}

function titleOverrideFor(url){
  const key = normalizedUrl(url);
  for(const [candidate, title] of Object.entries(NEWS_TITLE_OVERRIDES)){
    if(normalizedUrl(candidate) === key) return title;
  }
  return "";
}

function decodeUrlPart(value){
  try{
    return decodeURIComponent(String(value || "").replace(/\+/g," "));
  }catch(e){
    return String(value || "");
  }
}
function cleanCaptionText(value){
  let t = decodeUrlPart(value || "")
    .replace(/\.html?$/i,"")
    .replace(/\.(php|aspx?)$/i,"")
    .replace(/[?#].*$/,"")
    .replace(/[-_]+/g," ")
    .replace(/\s+/g," ")
    .trim();
  t = t.replace(/^news\s+/i,"").replace(/^article\s+/i,"").replace(/^details\s+/i,"");
  t = t.replace(/\b\d{4,}\b/g,"").replace(/\s+/g," ").trim();
  return t;
}
function captionFromUrl(url){
  const raw = String(url || "");
  if(!raw) return "";
  let path = "";
  try{
    path = new URL(sourceUrl(raw)).pathname;
  }catch(e){
    path = raw;
  }
  const parts = path.split("/").map(p=>p.trim()).filter(Boolean).reverse();
  const skip = new Set(["news","article","articles","details","country","national","bangladesh","whole-country","cities-villages","crime-and-discipline","medical-college-news","school","college","campus","city","district","post","home"]);
  for(const part of parts){
    const cleaned = cleanCaptionText(part);
    const compact = cleaned.replace(/\s+/g,"");
    if(!cleaned || compact.length < 8) continue;
    if(skip.has(cleaned.toLowerCase())) continue;
    if(/^\d+$/.test(compact)) continue;
    if(/^[a-f0-9]{10,}$/i.test(compact)) continue;
    if(/^[A-Za-z0-9]{8,}$/.test(compact) && !cleaned.includes(" ")) continue;
    return cleaned;
  }
  return "";
}

}
function child2026Title(r){
  const direct = titleFromAnyFields(r, "source_url");
  if(!isWeakCaption(direct) && !/^(School|College|Medical|University|Student|SSC|HSC|JSC|PSC\/PEC).*news/i.test(direct)) return direct;

  const groupRows = CHILD_STUDENT_2026_SOURCES.filter(x => String(x.incident_group_id || "") === String(r.incident_group_id || ""));
  for(const row of groupRows){
    const override = titleOverrideFor(row.source_url);
    if(!isWeakCaption(override)) return safePortalTitle(override);
    const caption = bestStaticCaptionFromUrl(row.source_url);
    if(!isWeakCaption(caption)) return caption;
  }
  return direct;
}

}
function downloadCart(format="csv"){
  const rows=getCartRecords(); if(!rows.length){alert("Cart is empty.");return;} if(format==="json"){downloadBlob(JSON.stringify(rows,null,2),"news-cart.json","application/json");return;}
  const header=["type","id","category","title","year","outlet","risk_period","reported_deaths_min","status","url","notes"];
  const csv=[header.join(",")].concat(rows.map(r=>header.map(h=>csvCell({type:r.type,id:r.id,category:r.category,title:r.title,year:r.year,outlet:r.outlet,risk_period:r.risk,reported_deaths_min:r.reported_deaths_min,status:r.status,url:r.url,notes:r.notes}[h])).join(","))).join("\n");
  downloadBlob(csv,"news-cart.csv","text/csv;charset=utf-8");
}
function csvCell(v){ const s=String(v??""); return `"${s.replace(/"/g,'""')}"`; }
function downloadBlob(content,filename,type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
